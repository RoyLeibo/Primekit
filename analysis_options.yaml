include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - '**/*.g.dart'
    - '**/*.freezed.dart'
    - 'example/**'
    # Firebase-backed concrete implementations.
    # These require firebase_* packages which are listed as dev_dependencies
    # (so the package compiles on all platforms without them).
    # Consumers who want Firebase integration add the packages themselves.
    - 'lib/src/crash/firebase_crash_reporter.dart'
    - 'lib/src/flags/firebase_flag_provider.dart'
    - 'lib/src/realtime/firebase_rtdb_channel.dart'
    - 'lib/src/realtime/presence_service.dart'
    - 'lib/src/rbac/providers/firebase_rbac_provider.dart'
    - 'lib/src/sync/providers/firestore_sync_source.dart'
    - 'lib/src/media/providers/firebase_storage_uploader.dart'
    - 'lib/src/social/social_auth_provider.dart'
    - 'lib/src/social/follow_service.dart'
    - 'lib/src/social/profile_service.dart'
    - 'lib/src/social/activity_feed_source.dart'
  errors:
    missing_required_param: error
    missing_return: error
    must_be_immutable: error
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

linter:
  rules:
    # Enabled rules
    - always_declare_return_types
    - annotate_overrides
    - avoid_bool_literals_in_conditional_expressions
    - avoid_double_and_int_checks
    - avoid_empty_else
    - avoid_field_initializers_in_const_classes
    - avoid_init_to_null
    - avoid_null_checks_in_equality_operators
    - avoid_print
    - avoid_relative_lib_imports
    - avoid_return_types_on_setters
    - avoid_shadowing_type_parameters
    - avoid_single_cascade_in_expression_statements
    - avoid_type_to_string
    - avoid_types_as_parameter_names
    - avoid_unnecessary_containers
    - avoid_unused_constructor_parameters
    - avoid_void_async
    - cancel_subscriptions
    - constant_identifier_names
    - control_flow_in_finally
    - curly_braces_in_flow_control_structures
    - empty_catches
    - empty_statements
    - exhaustive_cases
    - flutter_style_todos
    - join_return_with_assignment
    - leading_newlines_in_multiline_strings
    - library_names
    - missing_whitespace_between_adjacent_strings
    - no_adjacent_strings_in_list
    - no_duplicate_case_values
    - no_logic_in_create_state
    - no_runtimeType_toString
    - null_check_on_nullable_type_parameter
    - null_closures
    - only_throw_errors
    - package_prefixed_library_names
    - parameter_assignments
    - prefer_asserts_in_initializer_lists
    - prefer_asserts_with_message
    - prefer_const_constructors_in_immutables
    - prefer_const_literals_to_create_immutables
    - prefer_final_fields
    - prefer_final_in_for_each
    - prefer_if_null_operators
    - prefer_interpolation_to_compose_strings
    - prefer_is_empty
    - prefer_is_not_empty
    - prefer_is_not_operator
    - prefer_null_aware_operators
    - prefer_relative_imports
    - prefer_single_quotes
    - prefer_spread_collections
    - prefer_typing_uninitialized_variables
    - provide_deprecation_message
    - recursive_getters
    - require_trailing_commas
    - sized_box_for_whitespace
    - slash_for_doc_comments
    - test_types_in_equals
    - throw_in_finally
    - type_annotate_public_apis
    - unnecessary_await_in_return
    - unnecessary_brace_in_string_interps
    - unnecessary_const
    - unnecessary_getters_setters
    - unnecessary_late
    - unnecessary_new
    - unnecessary_null_aware_assignments
    - unnecessary_nullable_for_final_variable_declarations
    - unnecessary_overrides
    - unnecessary_statements
    - unnecessary_string_escapes
    - unnecessary_string_interpolations
    - unnecessary_this
    - unrelated_type_equality_checks
    - use_build_context_synchronously
    - use_colored_box
    - use_decorated_box
    - use_enums
    - use_full_hex_values_for_flutter_colors
    - use_if_null_to_convert_nulls_to_bools
    - use_is_even_rather_than_modulo
    - use_late_for_private_fields_and_variables
    - use_rethrow_when_possible
    - use_string_buffers
    - use_test_throws_matchers
    - use_to_and_as_if_applicable
    - valid_regexps
    - void_checks

    # Disabled — rules the codebase doesn't currently comply with
    always_put_required_named_parameters_first: false
    avoid_catches_without_on_clauses: false
    avoid_catching_errors: false
    avoid_dynamic_calls: false
    avoid_redundant_argument_values: false
    avoid_slow_async_io: false
    await_only_futures: false
    cascade_invocations: false
    cast_nullable_to_non_nullable: false
    close_sinks: false
    comment_references: false
    directives_ordering: false
    lines_longer_than_80_chars: false
    omit_local_variable_types: false
    prefer_const_constructors: false
    prefer_const_declarations: false
    prefer_constructors_over_static_methods: false
    prefer_expression_function_bodies: false
    prefer_final_locals: false
    prefer_foreach: false
    sort_child_properties_last: false
    sort_constructors_first: false
    sort_unnamed_constructors_first: false
    unawaited_futures: false
    unnecessary_import: false
    unnecessary_lambdas: false
    unnecessary_null_checks: false
    unnecessary_parenthesis: false
    unnecessary_raw_strings: false
    unnecessary_underscores: false
    use_named_constants: false
    use_null_aware_elements: false
    use_raw_strings: false
    use_setters_to_change_properties: false
