name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Analysis & Formatting ──────────────────────────────────────────────────
  analyze:
    name: Analyze & Format (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [primekit_core, primekit, primekit_firebase, primekit_riverpod]

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.3'
          channel: stable
          cache: true

      - name: Resolve workspace
        run: dart pub get

      - name: Verify formatting
        run: cd packages/${{ matrix.package }} && dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: cd packages/${{ matrix.package }} && flutter analyze --fatal-warnings

  # ─── Tests ──────────────────────────────────────────────────────────────────
  test:
    name: Test ${{ matrix.package }} (Flutter ${{ matrix.flutter-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flutter-version: ['3.41.3', '3.x']
        package: [primekit_core, primekit, primekit_riverpod]
        # primekit_firebase excluded — requires Firebase emulator

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter-version }}
          channel: stable
          cache: true

      - name: Resolve workspace
        run: dart pub get

      - name: Run tests with coverage
        run: cd packages/${{ matrix.package }} && flutter test --coverage --reporter=expanded

      - name: Check coverage threshold
        run: |
          dart pub global activate coverage
          cd packages/${{ matrix.package }}
          dart pub global run coverage:format_coverage \
            --lcov --in=coverage --out=coverage/lcov.info \
            --report-on=lib
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep "lines" | grep -o '[0-9.]*%' | head -1 | tr -d '%')
          echo "Coverage (${{ matrix.package }}): ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "Coverage ${COVERAGE}% is below 80% threshold"
            exit 1
          fi
          echo "Coverage ${COVERAGE}% meets threshold"

      - name: Upload coverage to Codecov
        if: matrix.flutter-version == '3.x'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/${{ matrix.package }}/coverage/lcov.info
          flags: ${{ matrix.package }}
          fail_ci_if_error: false

  # ─── Publish dry run ────────────────────────────────────────────────────────
  publish-dry-run:
    name: Publish Dry Run (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: [analyze, test]
    strategy:
      fail-fast: false
      matrix:
        package: [primekit_core, primekit, primekit_firebase, primekit_riverpod]

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve workspace
        run: dart pub get

      - name: Publish dry run
        run: cd packages/${{ matrix.package }} && dart pub publish --dry-run
