name: primekit_workspace
description: Dart workspace root for the PrimeKit package family.
publish_to: none

environment:
  sdk: '>=3.6.0 <4.0.0'

# Dart native workspace — resolves cross-package deps locally.
# Each package still declares real pub.dev version constraints
# so they publish and resolve independently.
workspace:
  - packages/primekit_core
  - packages/primekit
  - packages/primekit_firebase
  - packages/primekit_riverpod
  - example
