name: primekit_riverpod
description: >-
  Riverpod integration for PrimeKit: async notifier mixins, pagination helpers,
  and providers for auth, connectivity, preferences, and secure storage.
version: 1.1.0
resolution: workspace
homepage: https://github.com/RoyLeibo/Primekit
repository: https://github.com/RoyLeibo/Primekit
issue_tracker: https://github.com/RoyLeibo/Primekit/issues

topics:
  - flutter
  - riverpod
  - state-management
  - utilities

environment:
  sdk: '>=3.7.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  primekit_core: ^1.0.0
  primekit: ^1.0.0

  flutter_riverpod: ^2.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4
  test: ^1.25.2

flutter:
  uses-material-design: false
